<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Recurso Confiable · Votación de Nombres</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Roboto', 'Segoe UI', system-ui, sans-serif;
            background: #f5f7fa;
            color: #202124;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e0e0e0;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #1a73e8;
            margin-bottom: 0.25rem;
        }

        .header .sub {
            color: #5f6368;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(550px, 1fr));
            gap: 1.5rem;
        }

        .group-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .group-header {
            background: #f8f9fa;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .group-header h2 {
            font-size: 1.35rem;
            font-weight: 500;
            color: #1a73e8;
        }

        .proposals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            padding: 1.25rem;
        }

        .proposal-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.9rem;
            transition: background 0.2s;
        }

        .proposal-item:hover {
            background-color: #fef9e6;
        }

        .prop-name {
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px;
        }

        .vote-count {
            font-size: 0.75rem;
            background: #e8eaed;
            padding: 2px 8px;
            border-radius: 30px;
            color: #3c4043;
        }

        .proposer {
            font-size: 0.7rem;
            color: #5f6368;
            margin: 8px 0 6px;
        }

        .vote-btn {
            background: transparent;
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 6px 12px;
            width: 100%;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1a73e8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vote-btn:hover {
            background: #e8f0fe;
            border-color: #1a73e8;
        }

        .vote-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #323232;
            color: white;
            padding: 8px 20px;
            border-radius: 32px;
            font-size: 0.8rem;
            z-index: 1000;
        }

        .debug-panel {
            margin-top: 2rem;
            background: #f1f3f4;
            border-radius: 12px;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.7rem;
            color: #3c4043;
            border: 1px solid #e0e0e0;
            max-height: 200px;
            overflow: auto;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #80868b;
        }

        @media (max-width: 700px) {
            .groups-grid {
                grid-template-columns: 1fr;
            }
            .proposals-grid {
                grid-template-columns: 1fr;
            }
        }

        .loader {
            text-align: center;
            padding: 2rem;
            color: #5f6368;
        }

        button.test-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div style="font-size:0.85rem; color:#5f6368;">Recurso Confiable®</div>
        <h1>Votación de nombres</h1>
        <div class="sub">Selecciona tu propuesta favorita para cada sistema. Un voto por opción.</div>
    </div>

    <div id="app-root">
        <div class="loader">Cargando propuestas...</div>
    </div>
    
    <div class="debug-panel" id="debugLog">
        <button class="test-btn" id="testConnectionBtn">🔍 Probar conexión al Web App</button>
        <div id="logContent">📡 Esperando acciones...</div>
    </div>
    
    <footer>Los votos se registran automáticamente en la hoja oficial</footer>
</div>

<script>
    // ================= DATOS DE PROPUESTAS =================
    const PROPOSALS_RAW = [
        { persona: "Alberto Colin Enriquez", nombreAnterior: "AMS", nombrePropuesto: "NexAssets" },
        { persona: "Alberto Colin Enriquez", nombreAnterior: "ITSM", nombrePropuesto: "NexService" },
        { persona: "Alberto Colin Enriquez", nombreAnterior: "HCM", nombrePropuesto: "NexPeople" },
        { persona: "Alberto Colin Enriquez", nombreAnterior: "CM", nombrePropuesto: "NexClients" },
        { persona: "Alberto Colin Enriquez", nombreAnterior: "VMS", nombrePropuesto: "NexTrack" },
        { persona: "Alberto Colin Enriquez", nombreAnterior: "MDM", nombrePropuesto: "NexData" },
        { persona: "Mauricio Rodrigo Navarro Rojas", nombreAnterior: "AMS", nombrePropuesto: "Ohm" },
        { persona: "Mauricio Rodrigo Navarro Rojas", nombreAnterior: "ITSM", nombrePropuesto: "Volta" },
        { persona: "Mauricio Rodrigo Navarro Rojas", nombreAnterior: "HCM", nombrePropuesto: "Kelvin" },
        { persona: "Mauricio Rodrigo Navarro Rojas", nombreAnterior: "CM", nombrePropuesto: "Newton" },
        { persona: "Mauricio Rodrigo Navarro Rojas", nombreAnterior: "VMS", nombrePropuesto: "Lumen" },
        { persona: "Mauricio Rodrigo Navarro Rojas", nombreAnterior: "MDM", nombrePropuesto: "Pascal" },
        { persona: "Haegeth Eduardo Contla Martínez", nombreAnterior: "VMS", nombrePropuesto: "Horus" },
        { persona: "Haegeth Eduardo Contla Martínez", nombreAnterior: "AMS", nombrePropuesto: "Atlas" },
        { persona: "Haegeth Eduardo Contla Martínez", nombreAnterior: "ITSM", nombrePropuesto: "Hermes" },
        { persona: "Haegeth Eduardo Contla Martínez", nombreAnterior: "CM", nombrePropuesto: "Apollo" },
        { persona: "Haegeth Eduardo Contla Martínez", nombreAnterior: "HCM", nombrePropuesto: "Atenea" },
        { persona: "Haegeth Eduardo Contla Martínez", nombreAnterior: "MDM", nombrePropuesto: "Chronos" },
        { persona: "Carlos Alberto Álvarez Correa", nombreAnterior: "VMS", nombrePropuesto: "LENS" },
        { persona: "Carlos Alberto Álvarez Correa", nombreAnterior: "VMS", nombrePropuesto: "IRIS" },
        { persona: "Carlos Alberto Álvarez Correa", nombreAnterior: "AMS", nombrePropuesto: "TITAN" },
        { persona: "Carlos Alberto Álvarez Correa", nombreAnterior: "ITSM", nombrePropuesto: "NERVE" },
        { persona: "Carlos Alberto Álvarez Correa", nombreAnterior: "CM", nombrePropuesto: "PULSE" },
        { persona: "Carlos Alberto Álvarez Correa", nombreAnterior: "HCM", nombrePropuesto: "ROOTS" },
        { persona: "Carlos Alberto Álvarez Correa", nombreAnterior: "MDM", nombrePropuesto: "GENESIS" },
        { persona: "Sofia Vazquez Jimenez", nombreAnterior: "VMS", nombrePropuesto: "Nexus" },
        { persona: "Sofia Vazquez Jimenez", nombreAnterior: "MDM", nombrePropuesto: "Axis" },
        { persona: "Sofia Vazquez Jimenez", nombreAnterior: "MDM", nombrePropuesto: "Genesis" }
    ];

    // 👇 URL DEL WEB APP (actualízala aquí si cambia)
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzL_ApjJ5l1gQFb4-ndJE9z4GIlLF1cLfH0FoqtwLtylIsEUBS2x9EbdkRsrPuHWFpibQ/exec";

    let votesMap = new Map();  // almacén local de votos

    // Elementos DOM
    const rootElement = document.getElementById('app-root');
    const logContent = document.getElementById('logContent');

    function addLog(msg, isError = false) {
        const p = document.createElement('div');
        p.textContent = new Date().toLocaleTimeString() + " - " + msg;
        if (isError) p.style.color = "#d93025";
        logContent.appendChild(p);
        logContent.scrollTop = logContent.scrollHeight;
        console.log(msg);
    }

    function showMessage(text, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = text;
        if (isError) toast.style.backgroundColor = "#d93025";
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    // Prueba manual de conexión al Web App
    async function testConnection() {
        addLog("🔍 Probando conexión a: " + WEBAPP_URL);
        try {
            const response = await fetch(`${WEBAPP_URL}?action=getVotes&t=${Date.now()}`, {
                method: 'GET',
                cache: 'no-store'
            });
            addLog(`✅ GET respuesta HTTP: ${response.status}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            addLog(`📦 Datos recibidos: ${JSON.stringify(data).substring(0, 200)}`);
            if (data && data.votesMap) {
                addLog(`✅ Web App funcionando correctamente. Votos: ${Object.keys(data.votesMap).length}`);
                showMessage("✅ Web App responde correctamente");
            } else {
                addLog("⚠️ El Web App no devolvió votesMap", true);
            }
        } catch (err) {
            addLog(`❌ ERROR: ${err.message}`, true);
            showMessage("❌ No se pudo conectar al Web App. Revisa la URL y los permisos.", true);
        }
    }

    // Cargar votos desde el Web App
    async function fetchVotesFromSheet() {
        addLog("🔄 Cargando votos desde el Web App...");
        try {
            const response = await fetch(`${WEBAPP_URL}?action=getVotes&t=${Date.now()}`, {
                method: 'GET',
                cache: 'no-store'
            });
            addLog(`GET respuesta: ${response.status}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            addLog(`Datos recibidos: ${JSON.stringify(data).substring(0, 150)}`);
            if (data && data.votesMap) {
                const newMap = new Map();
                for (const [key, count] of Object.entries(data.votesMap)) {
                    newMap.set(key, count);
                }
                return newMap;
            }
            return new Map();
        } catch (err) {
            addLog(`❌ Error cargando votos: ${err.message}`, true);
            showMessage("⚠️ No se pudo conectar con la hoja de votos. Modo local solamente.", true);
            return new Map();
        }
    }

    // Enviar un voto
    async function sendVote(nombreAnterior, nombrePropuesto, persona) {
        const key = `${nombreAnterior}|${nombrePropuesto}|${persona}`;
        addLog(`📤 Enviando voto para ${nombrePropuesto} (${nombreAnterior})...`);
        try {
            const payload = {
                action: 'submitVote',
                nombreAnterior: nombreAnterior,
                nombrePropuesto: nombrePropuesto,
                persona: persona,
                timestamp: new Date().toISOString()
            };
            const response = await fetch(WEBAPP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            addLog(`POST respuesta: ${response.status}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            addLog(`Respuesta POST: ${JSON.stringify(result)}`);
            if (result.status === 'success') {
                const current = votesMap.get(key) || 0;
                votesMap.set(key, current + 1);
                renderAllGroups();
                showMessage(`✅ Voto registrado: "${nombrePropuesto}" (${nombreAnterior})`);
                addLog(`✅ Voto exitoso. Nuevo total: ${current+1}`);
                return true;
            } else {
                throw new Error(result.message || 'Error desconocido');
            }
        } catch (err) {
            addLog(`❌ Error en voto: ${err.message}`, true);
            showMessage(`❌ No se pudo registrar: ${err.message}`, true);
            return false;
        }
    }

    // Agrupar propuestas por nombreAnterior
    function groupProposalsByPrevious(proposalsArray) {
        const groups = new Map();
        proposalsArray.forEach(prop => {
            const anterior = prop.nombreAnterior;
            if (!groups.has(anterior)) groups.set(anterior, []);
            groups.get(anterior).push({
                persona: prop.persona,
                nombrePropuesto: prop.nombrePropuesto,
                voteKey: `${anterior}|${prop.nombrePropuesto}|${prop.persona}`
            });
        });
        for (let [key, list] of groups.entries()) {
            list.sort((a,b) => a.nombrePropuesto.localeCompare(b.nombrePropuesto));
            groups.set(key, list);
        }
        return groups;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderAllGroups() {
        if (!rootElement) return;
        const groups = groupProposalsByPrevious(PROPOSALS_RAW);
        if (groups.size === 0) {
            rootElement.innerHTML = '<div class="loader">⚠️ No hay propuestas</div>';
            return;
        }

        let html = `<div class="groups-grid">`;
        const sortedGroups = Array.from(groups.keys()).sort();
        for (let anterior of sortedGroups) {
            const proposals = groups.get(anterior);
            html += `
                <div class="group-card">
                    <div class="group-header">
                        <h2>📁 ${escapeHtml(anterior)}</h2>
                    </div>
                    <div class="proposals-grid">
            `;
            proposals.forEach(prop => {
                const key = prop.voteKey;
                const voteCount = votesMap.get(key) || 0;
                const safeNombre = escapeHtml(prop.nombrePropuesto);
                const safePersona = escapeHtml(prop.persona);
                const safeAnterior = escapeHtml(anterior);
                html += `
                    <div class="proposal-item">
                        <div class="prop-name">
                            <span>✨ ${safeNombre}</span>
                            <span class="vote-count">${voteCount} voto${voteCount !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="proposer">👤 ${safePersona}</div>
                        <button class="vote-btn" data-anterior="${safeAnterior}" data-propuesto="${safeNombre}" data-persona="${safePersona}">
                            👍 Votar
                        </button>
                    </div>
                `;
            });
            html += `</div></div>`;
        }
        html += `</div>`;
        rootElement.innerHTML = html;

        // Asignar eventos a los botones
        document.querySelectorAll('.vote-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const anterior = btn.getAttribute('data-anterior');
                const propuesto = btn.getAttribute('data-propuesto');
                const persona = btn.getAttribute('data-persona');
                btn.disabled = true;
                btn.innerHTML = '⏳ ...';
                await sendVote(anterior, propuesto, persona);
                btn.innerHTML = '👍 Votar';
                btn.disabled = false;
            });
        });
    }

    async function init() {
        rootElement.innerHTML = '<div class="loader">📄 Cargando votos...</div>';
        const fetchedVotes = await fetchVotesFromSheet();
        if (fetchedVotes && fetchedVotes.size > 0) {
            votesMap = fetchedVotes;
            addLog(`✅ ${fetchedVotes.size} votos cargados.`);
        } else {
            votesMap = new Map();
            addLog("ℹ️ No hay votos previos. Comienza votando.");
        }
        renderAllGroups();
    }

    // Configurar botón de prueba
    document.getElementById('testConnectionBtn').addEventListener('click', testConnection);

    // Iniciar
    init();
</script>
</body>
</html>
