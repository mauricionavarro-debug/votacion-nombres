
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurso Confiable · Votación oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1a73e8;
            --blue-light: #e8f0fe;
            --green: #137333;
            --green-light: #e6f4ea;
            --red: #d93025;
            --yellow: #fbbc04;
            --yellow-light: #fef7e0;
            --gray-bg: #f0f2f5;
            --gray-border: #dadce0;
            --gray-text: #5f6368;
            --gray-dark: #202124;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--gray-bg);
            padding: 2rem 1rem;
            color: var(--gray-dark);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 1.75rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--gray-border);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--blue);
            letter-spacing: -.5px;
        }
        .header .sub {
            color: var(--gray-text);
            margin-top: .4rem;
            font-size: .9rem;
        }

        .login-wrap {
            margin-top: 1.25rem;
            display: flex;
            gap: .75rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .login-wrap input {
            flex: 1;
            min-width: 240px;
            padding: .75rem 1rem;
            border: 1.5px solid var(--gray-border);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color .2s;
            outline: none;
        }
        .login-wrap input:focus { border-color: var(--blue); }

        .btn-primary {
            background: var(--blue);
            color: white;
            border: none;
            padding: .75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-family: inherit;
            font-size: .95rem;
            cursor: pointer;
            transition: opacity .15s;
        }
        .btn-primary:hover { opacity: .88; }

        .error-msg { color: var(--red); font-size: .82rem; margin-top: .5rem; }

        .user-banner {
            background: var(--blue-light);
            border: 1px solid #c5d8fb;
            border-radius: 10px;
            padding: .6rem 1.2rem;
            font-size: .85rem;
            color: #1558b0;
            font-weight: 500;
            margin-top: 1.25rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* ── Admin bar ── */
        .admin-bar {
            background: var(--yellow-light);
            border: 1px solid var(--yellow);
            border-radius: 10px;
            padding: .75rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: .85rem;
            color: var(--gray-text);
            flex-wrap: wrap;
        }
        .admin-bar .admin-label { font-weight: 600; color: #7a5c00; }
        .admin-note { font-size: .75rem; color: var(--gray-text); }
        .btn-reset {
            background: var(--red);
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: .82rem;
            transition: opacity .15s;
        }
        .btn-reset:hover { opacity: .85; }

        /* ── Groups grid ── */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
            gap: 1.5rem;
        }
        .group-card {
            background: white;
            border-radius: 14px;
            border: 1px solid var(--gray-border);
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
        }
        .group-header {
            background: #f8f9fa;
            padding: .9rem 1.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-border);
        }
        .group-header h2 { font-size: 1.2rem; font-weight: 600; color: var(--blue); }
        .voted-badge {
            font-size: .7rem;
            background: var(--green-light);
            color: var(--green);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .proposals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            padding: 1.25rem;
        }
        .proposal-item {
            border: 1.5px solid var(--gray-border);
            border-radius: 10px;
            padding: .9rem;
            transition: border-color .15s;
        }
        .proposal-item:hover { border-color: #aac4f5; }
        .proposal-item.own-proposal {
            background: var(--yellow-light);
            border-left: 3px solid var(--yellow);
        }
        .prop-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--gray-dark);
        }
        .proposer {
            font-size: .72rem;
            color: var(--gray-text);
            margin: 6px 0 10px;
            font-family: 'DM Mono', monospace;
        }
        .vote-btn {
            background: transparent;
            border: 1.5px solid var(--gray-border);
            border-radius: 24px;
            padding: 6px 14px;
            width: 100%;
            font-size: .78rem;
            font-weight: 600;
            color: var(--blue);
            cursor: pointer;
            font-family: inherit;
            transition: background .15s, border-color .15s;
        }
        .vote-btn:hover:not(:disabled) {
            background: var(--blue-light);
            border-color: var(--blue);
        }
        .vote-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            background: #f1f3f4;
            color: var(--gray-text);
        }
        .vote-btn.voted-this {
            background: var(--green-light);
            border-color: var(--green);
            color: var(--green);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #323232;
            color: white;
            padding: 10px 20px;
            border-radius: 32px;
            font-size: .82rem;
            z-index: 9999;
            opacity: 1;
            transition: opacity .4s;
            box-shadow: 0 4px 12px rgba(0,0,0,.25);
            max-width: 360px;
        }
        .toast.error { background: var(--red); }

        .hidden { display: none; }
        .loader { text-align: center; padding: 3rem; color: var(--gray-text); }

        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: .7rem;
            color: #80868b;
        }

        @media (max-width: 680px) {
            .groups-grid { grid-template-columns: 1fr; }
            .proposals-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ── Header / Login ── -->
    <div class="card header">
        <h1>🗳️ Votación de nombres</h1>
        <div class="sub">Recurso Confiable® · Elige las propuestas para cada sistema</div>

        <div id="loginSection">
            <div class="login-wrap">
                <input type="email" id="userEmail"
                    placeholder="tu-correo@recursoconfiable.com"
                    autocomplete="email" />
                <button class="btn-primary" id="enterBtn">Ingresar →</button>
            </div>
            <div id="emailError" class="error-msg"></div>
        </div>

        <div id="userBanner" class="user-banner hidden">
            <span>👤</span>
            <span id="userBannerText"></span>
        </div>
    </div>

    <!-- ── Voting area ── -->
    <div id="votingSection" class="hidden">

        <!-- Panel admin — solo visible para mauricionavarro@ -->
        <div id="adminBar" class="admin-bar hidden">
            <span class="admin-label">🔧 Panel admin</span>
            <button class="btn-reset" id="resetBtn">🗑️ Borrar mis votos de prueba</button>
            <span class="admin-note">Solo limpia tu localStorage · la sheet no se modifica</span>
        </div>

        <div id="app-root"><div class="loader">Cargando propuestas…</div></div>
    </div>

    <footer>Los votos se registran automáticamente en el servidor · Recurso Confiable®</footer>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const WEBHOOK_URL     = "https://workflow.grupoalefsi.com/webhook/4e2e714c-ff22-430e-8288-f1cd94d8fb9f";
const BASIC_AUTH_USER = "Mauricio";
const BASIC_AUTH_PASS = "Mauricio88";
const ADMIN_EMAIL     = "mauricionavarro@recursoconfiable.com";
const TIMEOUT_MS      = 10000; // 10 segundos máximo de espera

// ── Lista blanca de correos autorizados ──────────────────────
const CORREOS_AUTORIZADOS = new Set([
    "eduardocontla@recursoconfiable.com",
    "jorgecisneros@recursoconfiable.com",
    "saidmancera@recursoconfiable.com",
    "albertocolin@recursoconfiable.com",
    "sofiavazquez@recursoconfiable.com",
    "carlosalvarez@recursoconfiable.com",
    "mauricionavarro@recursoconfiable.com"
]);

// ── Correos de proponentes ───────────────────────────────────
const PROPONENTES_EMAIL = {
    "Alberto Colin Enriquez":           "albertocolin@recursoconfiable.com",
    "Mauricio Rodrigo Navarro Rojas":   "mauricionavarro@recursoconfiable.com",
    "Haegeth Eduardo Contla Martínez":  "eduardocontla@recursoconfiable.com",
    "Carlos Alberto Álvarez Correa":    "carlosalvarez@recursoconfiable.com",
    "Sofia Vazquez Jimenez":            "sofiavazquez@recursoconfiable.com"
};

// ── Propuestas ───────────────────────────────────────────────
const PROPUESTAS = [
    { persona: "Alberto Colin Enriquez",          anterior: "AMS",  propuesto: "NexAssets"  },
    { persona: "Alberto Colin Enriquez",          anterior: "ITSM", propuesto: "NexService" },
    { persona: "Alberto Colin Enriquez",          anterior: "HCM",  propuesto: "NexPeople"  },
    { persona: "Alberto Colin Enriquez",          anterior: "CM",   propuesto: "NexClients" },
    { persona: "Alberto Colin Enriquez",          anterior: "VMS",  propuesto: "NexTrack"   },
    { persona: "Alberto Colin Enriquez",          anterior: "MDM",  propuesto: "NexData"    },
    { persona: "Mauricio Rodrigo Navarro Rojas",  anterior: "AMS",  propuesto: "Ohm"        },
    { persona: "Mauricio Rodrigo Navarro Rojas",  anterior: "ITSM", propuesto: "Volta"      },
    { persona: "Mauricio Rodrigo Navarro Rojas",  anterior: "HCM",  propuesto: "Kelvin"     },
    { persona: "Mauricio Rodrigo Navarro Rojas",  anterior: "CM",   propuesto: "Newton"     },
    { persona: "Mauricio Rodrigo Navarro Rojas",  anterior: "VMS",  propuesto: "Lumen"      },
    { persona: "Mauricio Rodrigo Navarro Rojas",  anterior: "MDM",  propuesto: "Pascal"     },
    { persona: "Haegeth Eduardo Contla Martínez", anterior: "VMS",  propuesto: "Horus"      },
    { persona: "Haegeth Eduardo Contla Martínez", anterior: "AMS",  propuesto: "Atlas"      },
    { persona: "Haegeth Eduardo Contla Martínez", anterior: "ITSM", propuesto: "Hermes"     },
    { persona: "Haegeth Eduardo Contla Martínez", anterior: "CM",   propuesto: "Apollo"     },
    { persona: "Haegeth Eduardo Contla Martínez", anterior: "HCM",  propuesto: "Atenea"     },
    { persona: "Haegeth Eduardo Contla Martínez", anterior: "MDM",  propuesto: "Chronos"    },
    { persona: "Carlos Alberto Álvarez Correa",   anterior: "VMS",  propuesto: "LENS"       },
    { persona: "Carlos Alberto Álvarez Correa",   anterior: "VMS",  propuesto: "IRIS"       },
    { persona: "Carlos Alberto Álvarez Correa",   anterior: "AMS",  propuesto: "TITAN"      },
    { persona: "Carlos Alberto Álvarez Correa",   anterior: "ITSM", propuesto: "NERVE"      },
    { persona: "Carlos Alberto Álvarez Correa",   anterior: "CM",   propuesto: "PULSE"      },
    { persona: "Carlos Alberto Álvarez Correa",   anterior: "HCM",  propuesto: "ROOTS"      },
    { persona: "Carlos Alberto Álvarez Correa",   anterior: "MDM",  propuesto: "GENESIS"    },
    { persona: "Sofia Vazquez Jimenez",           anterior: "VMS",  propuesto: "Nexus"      },
    { persona: "Sofia Vazquez Jimenez",           anterior: "MDM",  propuesto: "Axis"       },
    { persona: "Sofia Vazquez Jimenez",           anterior: "MDM",  propuesto: "Genesis"    }
];

// ============================================================
// ESTADO
// ============================================================
let currentUserEmail   = "";
let userVotesBySistema = new Map();

// ── DOM refs ────────────────────────────────────────────────
const loginSection  = document.getElementById('loginSection');
const userBanner    = document.getElementById('userBanner');
const userBannerTxt = document.getElementById('userBannerText');
const votingSection = document.getElementById('votingSection');
const emailInput    = document.getElementById('userEmail');
const enterBtn      = document.getElementById('enterBtn');
const emailError    = document.getElementById('emailError');
const appRoot       = document.getElementById('app-root');
const adminBar      = document.getElementById('adminBar');
const resetBtn      = document.getElementById('resetBtn');

// ============================================================
// UTILIDADES
// ============================================================
function showToast(msg, isError = false) {
    const el = document.createElement('div');
    el.className = 'toast' + (isError ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 450);
    }, 4000);
}

function validarCorreo(email) {
    return /^[a-zA-Z0-9._%+\-]+@recursoconfiable\.com$/.test(email.trim().toLowerCase());
}

// ── Fetch con timeout ────────────────────────────────────────
function fetchConTimeout(url, opciones, ms) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    return fetch(url, { ...opciones, signal: controller.signal })
        .finally(() => clearTimeout(timer));
}

// ============================================================
// VOTOS LOCALES
// ============================================================
function cargarVotosLocales(email) {
    userVotesBySistema.clear();
    try {
        const raw = localStorage.getItem('votos_' + email);
        if (raw) {
            const obj = JSON.parse(raw);
            for (const [k, v] of Object.entries(obj)) userVotesBySistema.set(k, v);
        }
    } catch (_) {}
}

function guardarVotoLocal(email, sistema, propuesta) {
    try {
        const key = 'votos_' + email;
        let obj = {};
        const raw = localStorage.getItem(key);
        if (raw) obj = JSON.parse(raw);
        obj[sistema] = propuesta;
        localStorage.setItem(key, JSON.stringify(obj));
    } catch (_) {}
    userVotesBySistema.set(sistema, propuesta);
}

// ── Reset admin ──────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
    if (!confirm('¿Borrar todos tus votos de prueba?\n\nEsto solo limpia tu localStorage. La sheet NO se modifica.')) return;
    Object.keys(localStorage)
        .filter(k => k.startsWith('votos_'))
        .forEach(k => localStorage.removeItem(k));
    userVotesBySistema.clear();
    renderizar();
    showToast('✅ Votos de prueba borrados — ya puedes votar de nuevo');
});

// ============================================================
// LÓGICA DE VOTO
// ============================================================
function puedeVotar(anterior, persona) {
    if (userVotesBySistema.has(anterior)) return false;
    if (PROPONENTES_EMAIL[persona] === currentUserEmail) return false;
    return true;
}

// Restaura el botón a su estado original si algo falla
function restaurarBtn(btn) {
    btn.disabled    = false;
    btn.textContent = '👍 Votar';
}

async function enviarVoto(anterior, propuesto, persona, btn) {
    // Validaciones previas
    if (userVotesBySistema.has(anterior)) {
        showToast("❌ Ya emitiste tu voto para " + anterior, true);
        restaurarBtn(btn);
        return;
    }
    if (PROPONENTES_EMAIL[persona] === currentUserEmail) {
        showToast("❌ No puedes votar por tu propia propuesta", true);
        restaurarBtn(btn);
        return;
    }

    const payload = {
        email:     currentUserEmail,
        sistema:   anterior,
        propuesta: propuesto,
        persona:   persona,
        timestamp: new Date().toISOString()
    };

    try {
        const creds = btoa(BASIC_AUTH_USER + ":" + BASIC_AUTH_PASS);

        const res = await fetchConTimeout(WEBHOOK_URL, {
            method:  "POST",
            headers: {
                "Authorization": "Basic " + creds,
                "Content-Type":  "application/json"
            },
            body: JSON.stringify(payload)
        }, TIMEOUT_MS);

        if (res.ok) {
            let data = {};
            try { data = await res.json(); } catch (_) {}

            // Acepta: { status: "success" } o simplemente HTTP 200
            if (data.status === "success" || res.status === 200) {
                guardarVotoLocal(currentUserEmail, anterior, propuesto);
                renderizar(); // re-dibuja toda la UI con el nuevo estado
                showToast('✅ Voto registrado: "' + propuesto + '" para ' + anterior);
            } else {
                throw new Error(data.message || "El servidor respondió sin confirmar el voto");
            }
        } else {
            let txt = "";
            try { txt = await res.text(); } catch (_) {}
            throw new Error("Error " + res.status + (txt ? ": " + txt.slice(0, 80) : ""));
        }

    } catch (err) {
        console.error("[Votación]", err);

        // Mensaje de error amigable según el tipo de fallo
        if (err.name === "AbortError") {
            showToast("❌ Tiempo de espera agotado. Verifica tu conexión e intenta de nuevo.", true);
        } else if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
            showToast("❌ Sin conexión al servidor. Revisa tu internet e intenta de nuevo.", true);
        } else {
            showToast("❌ " + err.message, true);
        }

        // ── CRÍTICO: restaurar el botón para que el usuario pueda reintentar ──
        restaurarBtn(btn);
    }
}

// ============================================================
// RENDER
// ============================================================
function renderizar() {
    const grupos = new Map();
    for (const p of PROPUESTAS) {
        if (!grupos.has(p.anterior)) grupos.set(p.anterior, []);
        grupos.get(p.anterior).push(p);
    }

    let html = '<div class="groups-grid">';

    for (const [anterior, lista] of grupos) {
        const yaVoto      = userVotesBySistema.has(anterior);
        const votoEmitido = userVotesBySistema.get(anterior) || null;

        html += `
          <div class="group-card">
            <div class="group-header">
              <h2>📁 ${anterior}</h2>
              ${yaVoto ? '<span class="voted-badge">✓ Voto emitido</span>' : ''}
            </div>
            <div class="proposals-grid">
        `;

        for (const p of lista) {
            const esPropia   = PROPONENTES_EMAIL[p.persona] === currentUserEmail;
            const puede      = puedeVotar(p.anterior, p.persona);
            const esEsteVoto = votoEmitido === p.propuesto;

            html += `
              <div class="proposal-item ${esPropia ? 'own-proposal' : ''}">
                <div class="prop-name">✨ ${p.propuesto}</div>
                <div class="proposer">👤 ${p.persona}</div>
                <button class="vote-btn ${esEsteVoto ? 'voted-this' : ''}"
                  data-anterior="${p.anterior}"
                  data-propuesto="${p.propuesto}"
                  data-persona="${encodeURIComponent(p.persona)}"
                  ${!puede ? 'disabled' : ''}>
                  ${esEsteVoto ? '✔ Tu voto' : !puede ? '🚫 No disponible' : '👍 Votar'}
                </button>
              </div>
            `;
        }

        html += '</div></div>';
    }

    html += '</div>';
    appRoot.innerHTML = html;

    // Pasar el propio botón a enviarVoto para poder restaurarlo si falla
    appRoot.querySelectorAll('.vote-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', async () => {
            const anterior  = btn.dataset.anterior;
            const propuesto = btn.dataset.propuesto;
            const persona   = decodeURIComponent(btn.dataset.persona);
            btn.disabled    = true;
            btn.textContent = '⏳ Registrando…';
            await enviarVoto(anterior, propuesto, persona, btn);
        });
    });
}

// ============================================================
// LOGIN
// ============================================================
function iniciarVotacion(email) {
    currentUserEmail = email.trim().toLowerCase();
    cargarVotosLocales(currentUserEmail);

    userBannerTxt.textContent = "Sesión activa: " + currentUserEmail;
    userBanner.classList.remove('hidden');
    loginSection.classList.add('hidden');
    votingSection.classList.remove('hidden');

    if (currentUserEmail === ADMIN_EMAIL) {
        adminBar.classList.remove('hidden');
    }

    renderizar();
}

enterBtn.addEventListener('click', () => {
    const email = emailInput.value.trim().toLowerCase();
    emailError.textContent = '';

    if (!validarCorreo(email)) {
        emailError.textContent = "Escribe un correo válido @recursoconfiable.com";
        return;
    }
    if (!CORREOS_AUTORIZADOS.has(email)) {
        emailError.textContent = "❌ Este correo no está autorizado para votar.";
        return;
    }

    iniciarVotacion(email);
});

emailInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') enterBtn.click();
});
</script>
</body>
</html>
