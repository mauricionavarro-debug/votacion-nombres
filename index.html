<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurso Confiable · Votación oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Google Sans', 'Roboto', system-ui;
            background: #f0f2f5;
            padding: 2rem 1rem;
            color: #202124;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e0e0e0;
        }
        .header h1 { font-size: 1.8rem; font-weight: 500; color: #1a73e8; }
        .sub { color: #5f6368; margin-top: 0.5rem; }
        .email-input {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .email-input input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .email-input button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
        }
        .error { color: #d93025; font-size: 0.85rem; margin-top: 0.5rem; }
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(550px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .group-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }
        .group-header {
            background: #f8f9fa;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .group-header h2 { font-size: 1.35rem; font-weight: 500; color: #1a73e8; }
        .voted-badge { font-size: 0.7rem; background: #e6f4ea; color: #137333; padding: 2px 8px; border-radius: 20px; }
        .proposals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            padding: 1.25rem;
        }
        .proposal-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.9rem;
        }
        .prop-name {
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .proposer {
            font-size: 0.7rem;
            color: #5f6368;
            margin: 8px 0 6px;
        }
        .vote-btn {
            background: transparent;
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 6px 12px;
            width: 100%;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1a73e8;
            cursor: pointer;
        }
        .vote-btn:hover:not(:disabled) { background: #e8f0fe; border-color: #1a73e8; }
        .vote-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f3f4;
        }
        .own-proposal {
            background-color: #fef7e0;
            border-left: 3px solid #fbbc04;
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #323232;
            color: white;
            padding: 8px 20px;
            border-radius: 32px;
            font-size: 0.8rem;
            z-index: 1000;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #80868b;
        }
        @media (max-width: 700px) {
            .groups-grid { grid-template-columns: 1fr; }
            .proposals-grid { grid-template-columns: 1fr; }
        }
        .loader { text-align: center; padding: 2rem; color: #5f6368; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card header">
        <h1>Votación de nombres</h1>
        <div class="sub">Recurso Confiable® · Elige las propuestas para cada sistema</div>
        <div class="email-input" id="emailSection">
            <input type="email" id="userEmail" placeholder="tu-correo@recursoconfiable.com" pattern=".*@recursoconfiable\.com$" required>
            <button id="validateEmailBtn">Ingresar</button>
        </div>
        <div id="emailError" class="error"></div>
    </div>

    <div id="votingSection" class="hidden">
        <div id="app-root"><div class="loader">Cargando propuestas...</div></div>
    </div>
    <footer>Los votos se registran automáticamente</footer>
</div>

<script>
    // ============================================================
    // 1. CONFIGURACIÓN DEL WEBHOOK (TUS DATOS)
    // ============================================================
    const WEBHOOK_URL = "https://workflow.grupoalefsi.com/webhook/4e2e714c-ff22-430e-8288-f1cd94d8fb9f";
    const BASIC_AUTH_USER = "Mauricio";
    const BASIC_AUTH_PASS = "Mauricio88";

    // ============================================================
    // 2. DATOS DE PROPUESTAS Y CORREOS DE PROPONENTES
    // ============================================================
    const PROPUESTAS = [
        { persona: "Alberto Colin Enriquez", anterior: "AMS", propuesto: "NexAssets" },
        { persona: "Alberto Colin Enriquez", anterior: "ITSM", propuesto: "NexService" },
        { persona: "Alberto Colin Enriquez", anterior: "HCM", propuesto: "NexPeople" },
        { persona: "Alberto Colin Enriquez", anterior: "CM", propuesto: "NexClients" },
        { persona: "Alberto Colin Enriquez", anterior: "VMS", propuesto: "NexTrack" },
        { persona: "Alberto Colin Enriquez", anterior: "MDM", propuesto: "NexData" },
        { persona: "Mauricio Rodrigo Navarro Rojas", anterior: "AMS", propuesto: "Ohm" },
        { persona: "Mauricio Rodrigo Navarro Rojas", anterior: "ITSM", propuesto: "Volta" },
        { persona: "Mauricio Rodrigo Navarro Rojas", anterior: "HCM", propuesto: "Kelvin" },
        { persona: "Mauricio Rodrigo Navarro Rojas", anterior: "CM", propuesto: "Newton" },
        { persona: "Mauricio Rodrigo Navarro Rojas", anterior: "VMS", propuesto: "Lumen" },
        { persona: "Mauricio Rodrigo Navarro Rojas", anterior: "MDM", propuesto: "Pascal" },
        { persona: "Haegeth Eduardo Contla Martínez", anterior: "VMS", propuesto: "Horus" },
        { persona: "Haegeth Eduardo Contla Martínez", anterior: "AMS", propuesto: "Atlas" },
        { persona: "Haegeth Eduardo Contla Martínez", anterior: "ITSM", propuesto: "Hermes" },
        { persona: "Haegeth Eduardo Contla Martínez", anterior: "CM", propuesto: "Apollo" },
        { persona: "Haegeth Eduardo Contla Martínez", anterior: "HCM", propuesto: "Atenea" },
        { persona: "Haegeth Eduardo Contla Martínez", anterior: "MDM", propuesto: "Chronos" },
        { persona: "Carlos Alberto Álvarez Correa", anterior: "VMS", propuesto: "LENS" },
        { persona: "Carlos Alberto Álvarez Correa", anterior: "VMS", propuesto: "IRIS" },
        { persona: "Carlos Alberto Álvarez Correa", anterior: "AMS", propuesto: "TITAN" },
        { persona: "Carlos Alberto Álvarez Correa", anterior: "ITSM", propuesto: "NERVE" },
        { persona: "Carlos Alberto Álvarez Correa", anterior: "CM", propuesto: "PULSE" },
        { persona: "Carlos Alberto Álvarez Correa", anterior: "HCM", propuesto: "ROOTS" },
        { persona: "Carlos Alberto Álvarez Correa", anterior: "MDM", propuesto: "GENESIS" },
        { persona: "Sofia Vazquez Jimenez", anterior: "VMS", propuesto: "Nexus" },
        { persona: "Sofia Vazquez Jimenez", anterior: "MDM", propuesto: "Axis" },
        { persona: "Sofia Vazquez Jimenez", anterior: "MDM", propuesto: "Genesis" }
    ];

    const proponentesEmail = {
        "Alberto Colin Enriquez": "albertocolin@recursoconfiable.com",
        "Mauricio Rodrigo Navarro Rojas": "mauricionavarro@recursoconfiable.com",
        "Haegeth Eduardo Contla Martínez": "eduardocontla@recursoconfiable.com",
        "Carlos Alberto Álvarez Correa": "carlosalvarez@recursoconfiable.com",
        "Sofia Vazquez Jimenez": "sofiavazquez@recursoconfiable.com"
    };

    let currentUserEmail = "";
    let userVotesBySistema = new Map();

    const emailSection = document.getElementById('emailSection');
    const votingSection = document.getElementById('votingSection');
    const userEmailInput = document.getElementById('userEmail');
    const validateBtn = document.getElementById('validateEmailBtn');
    const emailErrorDiv = document.getElementById('emailError');
    const appRoot = document.getElementById('app-root');

    function showMessage(text, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = text;
        if (isError) toast.style.backgroundColor = "#d93025";
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    function validateEmail(email) {
        return /^[a-zA-Z0-9._%+-]+@recursoconfiable\.com$/.test(email);
    }

    function cargarVotosLocales(email) {
        const key = `votos_${email}`;
        const stored = localStorage.getItem(key);
        if (stored) {
            const obj = JSON.parse(stored);
            userVotesBySistema.clear();
            for (const [sistema, propuesta] of Object.entries(obj)) {
                userVotesBySistema.set(sistema, propuesta);
            }
        } else {
            userVotesBySistema.clear();
        }
    }

    function guardarVotoLocal(email, sistema, propuesta) {
        const key = `votos_${email}`;
        let obj = {};
        const stored = localStorage.getItem(key);
        if (stored) obj = JSON.parse(stored);
        obj[sistema] = propuesta;
        localStorage.setItem(key, JSON.stringify(obj));
        userVotesBySistema.set(sistema, propuesta);
    }

    async function enviarVoto(anterior, propuesto, persona, userEmail) {
        if (userVotesBySistema.has(anterior)) {
            showMessage("❌ Ya votaste en este sistema", true);
            return false;
        }
        if (proponentesEmail[persona] === userEmail) {
            showMessage("❌ No puedes votar por tu propia propuesta", true);
            return false;
        }

        const payload = {
            email: userEmail,
            sistema: anterior,
            propuesta: propuesto,
            persona: persona,
            timestamp: new Date().toISOString()
        };

        try {
            const credentials = btoa(`${BASIC_AUTH_USER}:${BASIC_AUTH_PASS}`);
            const response = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Basic ${credentials}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (response.ok && data.status === "success") {
                guardarVotoLocal(userEmail, anterior, propuesto);
                renderizar();
                showMessage(`✅ Voto registrado para "${propuesto}" (${anterior})`);
                return true;
            } else {
                throw new Error(data.message || "Error del servidor");
            }
        } catch (err) {
            console.error(err);
            showMessage(`❌ No se pudo registrar: ${err.message}`, true);
            return false;
        }
    }

    function puedeVotar(anterior, propuesto, personaPropuesta, userEmail) {
        if (userVotesBySistema.has(anterior)) return false;
        if (proponentesEmail[personaPropuesta] === userEmail) return false;
        return true;
    }

    function renderizar() {
        if (!appRoot) return;
        const grupos = new Map();
        for (let p of PROPUESTAS) {
            if (!grupos.has(p.anterior)) grupos.set(p.anterior, []);
            grupos.get(p.anterior).push(p);
        }
        let html = `<div class="groups-grid">`;
        for (let [anterior, lista] of grupos.entries()) {
            const yaVoto = userVotesBySistema.has(anterior);
            html += `
                <div class="group-card">
                    <div class="group-header">
                        <h2>📁 ${anterior}</h2>
                        ${yaVoto ? '<span class="voted-badge">✓ Voto emitido</span>' : ''}
                    </div>
                    <div class="proposals-grid">
            `;
            for (let p of lista) {
                const esPropia = (proponentesEmail[p.persona] === currentUserEmail);
                const puede = puedeVotar(p.anterior, p.propuesto, p.persona, currentUserEmail);
                const botonDisabled = !puede || yaVoto;
                html += `
                    <div class="proposal-item ${esPropia ? 'own-proposal' : ''}">
                        <div class="prop-name">
                            <span>✨ ${p.propuesto}</span>
                        </div>
                        <div class="proposer">👤 ${p.persona}</div>
                        <button class="vote-btn" 
                            data-anterior="${p.anterior}"
                            data-propuesto="${p.propuesto}"
                            data-persona="${p.persona}"
                            ${botonDisabled ? 'disabled' : ''}>
                            ${botonDisabled ? '🚫 No disponible' : '👍 Votar'}
                        </button>
                    </div>
                `;
            }
            html += `</div></div>`;
        }
        html += `</div>`;
        appRoot.innerHTML = html;

        document.querySelectorAll('.vote-btn:not([disabled])').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const anterior = btn.dataset.anterior;
                const propuesto = btn.dataset.propuesto;
                const persona = btn.dataset.persona;
                btn.disabled = true;
                btn.innerHTML = "⏳ ...";
                await enviarVoto(anterior, propuesto, persona, currentUserEmail);
                btn.innerHTML = "👍 Votar";
                renderizar();
            });
        });
    }

    function iniciarVotacion(email) {
        currentUserEmail = email;
        cargarVotosLocales(email);
        votingSection.classList.remove('hidden');
        emailSection.classList.add('hidden');
        renderizar();
    }

    validateBtn.addEventListener('click', () => {
        const email = userEmailInput.value.trim();
        if (!validateEmail(email)) {
            emailErrorDiv.innerText = "Correo no válido. Debe terminar en @recursoconfiable.com";
            return;
        }
        emailErrorDiv.innerText = "";
        iniciarVotacion(email);
    });

    userEmailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') validateBtn.click();
    });

    votingSection.classList.add('hidden');
</script>
</body>
</html>
